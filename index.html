    detail: `L'empereur Vespasien, fondateur de la dynastie flavienne, a lancé la construction du Colisée vers 70 apr. J.-C. dans un geste politique magistral. Après le règne décrié de Néron, qui avait accaparé d'immenses terrains au cœur de Rome pour sa Domus Aurea (« Maison dorée »), Vespasien a choisi délibérément d'ériger un monument public sur le site de l'ancien lac artificiel privé de Néron. Ce choix n'était pas anodin : il symbolisait la restitution au peuple romain de ce qu'un tyran avait confisqué.

    detail: `Le Colisée est un chef-d'œuvre d'ingénierie dont les dimensions restent impressionnantes : 189 mètres de long, 156 mètres de large et 48 mètres de haut — l'équivalent d'un immeuble de 15 étages. Sa forme elliptique n'est pas un hasard : elle offrait une visibilité optimale depuis tous les gradins et permettait une meilleure distribution des charges structurelles.

    detail: `Lorsque vous visitez le Colisée aujourd'hui, vous circulez principalement dans les deux premiers niveaux de la façade extérieure et des galeries intérieures — et ces deux étages racontent à eux seuls une leçon magistrale d'architecture romaine. La façade est organisée selon le principe de la « superposition des ordres », une convention esthétique héritée des Grecs mais systématisée par les Romains : chaque niveau utilise un ordre architectural différent, du plus massif en bas au plus élancé en haut, créant une illusion optique de légèreté ascendante.

Le deuxième ordre (premier étage) adopte l'ordre ionique, reconnaissable à ses chapiteaux ornés de deux volutes latérales enroulées en spirale — un motif élégant que l'on peut encore observer sur les colonnes de la façade nord, la mieux conservée. Les proportions changent subtilement : les colonnes sont plus fines et plus élancées qu'au niveau inférieur, accentuant l'effet de légèreté progressive voulu par les architectes. Ce niveau abritait les gradins de la « maeniana prima », où siégeaient les chevaliers. C'est depuis la galerie extérieure de ce niveau que l'on obtient aujourd'hui les vues les plus spectaculaires sur l'intérieur du Colisée et sur l'hypogée en contrebas — le point photo par excellence.

    detail: `Le « velarium » reste l'un des aspects les plus fascinants et les plus débattus du Colisée. Il s'agissait d'une gigantesque voile rétractable, probablement en lin ou en coton, tendue au-dessus des gradins pour protéger les spectateurs du soleil brûlant de Rome et des intempéries. Son déploiement était confié à un détachement de 1 000 marins de la flotte impériale basée à Misène (près de Naples), les seuls professionnels maîtrisant les techniques de cordage nécessaires.

    detail: `L'image populaire du gladiateur — un esclave enchaîné forcé de se battre à mort — est une simplification considérable d'une réalité beaucoup plus complexe et nuancée. Les gladiateurs formaient une catégorie sociale à part dans le monde romain, un mélange fascinant d'esclaves, de prisonniers de guerre, de condamnés de droit commun (damnati), mais aussi de volontaires libres (auctorati) qui choisissaient cette carrière pour l'argent, la gloire ou par goût du risque. Certains historiens estiment que jusqu'à un quart des gladiateurs étaient des volontaires.

    detail: `Parmi tous les spectacles organisés au Colisée, les naumachies — des reconstitutions de batailles navales — restent les plus extraordinaires et les plus débattus par les historiens. Le concept existait avant le Colisée : Jules César avait déjà organisé une naumachie en 46 av. J.-C. dans un bassin creusé près du Tibre, et Auguste en avait fait de même en 2 av. J.-C. sur un lac artificiel.

    detail: `La fin des combats de gladiateurs n'a pas été un événement soudain mais l'aboutissement d'un long processus lié à la christianisation de l'Empire romain. Dès le IVe siècle, les Pères de l'Église avaient dénoncé la barbarie des jeux de l'arène. L'empereur Constantin, premier empereur chrétien, avait promulgué un édit en 325 limitant les combats, mais sans grand effet concret.

    detail: `Après la chute de l'Empire romain d'Occident en 476, le Colisée a entamé une longue période de déclin et de transformation qui a duré près d'un millénaire. Dès le VIe siècle, l'amphithéâtre a cessé d'accueillir des spectacles et a connu des usages variés et parfois surprenants : il a servi de cimetière, de forteresse pour les familles nobles romaines (notamment les Frangipane au XIIe siècle), d'atelier pour des artisans, de logement pour des squatteurs, et même de sanctuaire religieux.

    detail: `L'un des aspects les plus inattendus du Colisée est son extraordinaire richesse botanique, qui en fait un site d'intérêt scientifique autant qu'historique. Dès le XIXe siècle, des botanistes ont commencé à cataloguer la flore remarquable qui prospérait dans les ruines de l'amphithéâtre.

Parmi elles se trouvaient des espèces méditerranéennes communes, mais aussi des plantes exotiques provenant d'Afrique du Nord, d'Asie et du Moyen-Orient — des régions d'où étaient importés les animaux pour les jeux. L'hypothèse la plus fascinante est que les graines de ces plantes auraient été transportées dans la fourrure et le système digestif des animaux sauvages amenés au Colisée, ou dans le foin qui leur servait de litière.

Le microclimat particulier créé par les ruines — des zones d'ombre humides, des parois chauffées par le soleil, des niches protégées du vent — a permis à ces espèces de survivre loin de leur habitat naturel. Les campagnes de restauration modernes ont malheureusement réduit cette diversité botanique : le nettoyage des murs et l'application de biocides pour protéger la pierre ont éliminé de nombreuses espèces.

Aujourd'hui, les botanistes travaillent en collaboration avec les archéologues pour trouver un équilibre entre la préservation de la structure et la protection de cet héritage biologique unique, témoin indirect de la circulation des animaux et des marchandises à travers l'Empire romain.`,

            background: isOpen ? "#2E6B62" : "#C4572A",
            color: "#fff",
            border: "none",
            borderRadius: "20px",
            padding: "10px 24px",
            fontSize: "13px",
            fontWeight: "600",
            cursor: "pointer",
            fontFamily: "Helvetica, sans-serif",
            transition: "background 0.3s ease",
          }}
        >
          {isOpen ? "⛵ Déployer le velarium" : "☀️ Ouvrir le velarium"}
        </button>
      </div>

      <p style={{
        fontSize: "11px", color: "#A89B8C", textAlign: "center",
        margin: "12px 0 0", fontStyle: "italic", lineHeight: "1.5",
      }}>
        {isOpen
          ? "Sans le velarium, les spectateurs des gradins supérieurs étaient exposés au soleil brûlant de Rome."
          : "1 000 marins de la flotte impériale manœuvraient la toile grâce à 240 mâts et un réseau de cordages."}
      </p>
    </div>
  );
}

function SizeComparison() {
  const buildings = [
    { name: "Stade de France", height: 46, length: 274, emoji: "🏟️", color: "#3D5A80" },
    { name: "Colisée", height: 48, length: 189, emoji: "🏛️", color: "#C4572A" },
    { name: "Tour Eiffel", height: 330, length: 125, emoji: "🗼", color: "#8B6F4E" },
  ];

  const maxH = 330;
  const barAreaH = 180;
  const scale = barAreaH / maxH;
  const barW = 62;
  const gap = 28;
  const totalW = buildings.length * barW + (buildings.length - 1) * gap;
  const startX = (totalW) / 2;

  return (
    <div style={{
      margin: "20px 0",
      background: "linear-gradient(180deg, #F3EDE5 0%, #FAF6F1 100%)",
      borderRadius: "12px",
      border: "1px solid #E2D9CE",
      padding: "20px 12px 16px",
    }}>
      <p style={{
        fontSize: "12px", fontWeight: "700", textTransform: "uppercase",
        letterSpacing: "1.5px", color: "#8B7D6B", textAlign: "center",
        margin: "0 0 6px",
      }}>Comparaison des dimensions</p>
      <p style={{
        fontSize: "11px", color: "#A89B8C", textAlign: "center",
        margin: "0 0 16px",
      }}>Hauteur et longueur à la même échelle</p>

      {/* Height comparison */}
      <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end", gap: "6px", marginBottom: "8px", height: `${barAreaH + 40}px` }}>
        {buildings.map((b) => {
          const h = b.height * scale;
          return (
            <div key={b.name} style={{ display: "flex", flexDirection: "column", alignItems: "center", width: `${barW + 16}px` }}>
              <span style={{ fontSize: "18px", marginBottom: "4px" }}>{b.emoji}</span>
              <span style={{
                fontSize: "13px", fontWeight: "700", color: b.color, marginBottom: "4px",
              }}>{b.height} m</span>
              <div style={{
                width: `${barW}px`,
                height: `${h}px`,
                background: `linear-gradient(180deg, ${b.color}, ${b.color}AA)`,
                borderRadius: "6px 6px 0 0",
                position: "relative",
                minHeight: "12px",
                transition: "height 0.5s ease",
              }} />
            </div>
          );
        })}
      </div>

      {/* Base line */}
      <div style={{ height: "2px", background: "#D5CBBD", margin: "0 8px 16px", borderRadius: "1px" }} />

      {/* Length comparison */}
      <p style={{
        fontSize: "11px", fontWeight: "600", color: "#8B7D6B", textAlign: "center",
        margin: "0 0 10px", textTransform: "uppercase", letterSpacing: "1px",
      }}>Longueur au sol</p>
      <div style={{ padding: "0 4px" }}>
        {[...buildings].sort((a, b) => b.length - a.length).map((b) => {
          const pct = (b.length / 274) * 100;
          return (
            <div key={b.name} style={{ marginBottom: "8px" }}>
              <div style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                marginBottom: "3px",
              }}>
                <span style={{ fontSize: "12px", fontWeight: "600", color: "#4A3F37" }}>
                  {b.emoji} {b.name}
                </span>
                <span style={{ fontSize: "12px", fontWeight: "700", color: b.color }}>
                  {b.length} m
                </span>
              </div>
              <div style={{
                height: "10px", background: "#E8E0D5", borderRadius: "5px", overflow: "hidden",
              }}>
                <div style={{
                  width: `${pct}%`, height: "100%",
                  background: `linear-gradient(90deg, ${b.color}, ${b.color}BB)`,
                  borderRadius: "5px",
                  transition: "width 0.6s ease",
                }} />
              </div>
            </div>
          );
        })}
      </div>

      <p style={{
        fontSize: "11px", color: "#A89B8C", textAlign: "center",
        margin: "12px 0 0", fontStyle: "italic", lineHeight: "1.5",
      }}>
        Le Colisée est 7 fois moins haut que la Tour Eiffel, mais son emprise au sol est 1,5 fois plus grande que sa base.
      </p>
    </div>
  );
}

function DetailText({ text, color }) {
  const paragraphs = text.split("\n\n");
  return (
    <div>
      {paragraphs.map((para, i) => {
        if (i === 0) {
          const firstDot = para.indexOf(". ");
          if (firstDot === -1) {
            return (
              <p key={i} style={{
                fontSize: "15px", color: "#4A3F37", margin: "0 0 14px", lineHeight: "1.8",
              }}>
                <strong style={{ color: color }}>{para}</strong>
              </p>
            );
          }
          const firstSentence = para.substring(0, firstDot + 1);
          const rest = para.substring(firstDot + 2);
          return (
            <p key={i} style={{
              fontSize: "15px", color: "#4A3F37", margin: "0 0 14px", lineHeight: "1.8",
            }}>
              <strong style={{ color: color }}>{firstSentence}</strong>{rest ? " " + rest : ""}
            </p>
          );
        }
        return (
          <p key={i} style={{
            fontSize: "15px", color: "#4A3F37", margin: "0 0 14px", lineHeight: "1.8",
          }}>
            {para}
          </p>
        );
      })}
    </div>
  );
}

function ColosseumEncyclopedia() {

      {/* Facts list */}
      <div style={{ padding: "20px 16px 40px" }}>

              {isOpen && (

          );
        })}

      <style>{`
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(-8px); }
          to { opacity: 1; transform: translateY(0); }

    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<ColosseumEncyclopedia />);
